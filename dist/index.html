<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Strudel RLM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #0d0d1a;
      color: #eee;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 280px 1fr;
      grid-template-areas:
        "header header"
        "timeline main"
        "controls controls";
    }

    /* Header */
    header {
      grid-area: header;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: #131325;
      border-bottom: 1px solid #222;
    }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.05em; }
    #phase {
      font-size: 0.8rem;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      background: #1a1a3a;
      color: #888;
    }
    #phase.composing { color: #f0c040; background: #2a2510; }
    #phase.ready { color: #4ade80; background: #0f2a1a; }
    #phase.shutting-down { color: #f87171; background: #2a0f0f; }

    /* Timeline sidebar */
    #timeline {
      grid-area: timeline;
      overflow-y: auto;
      padding: 0.75rem;
      border-right: 1px solid #222;
      background: #10101e;
    }
    #timeline h2 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      margin-bottom: 0.5rem;
    }
    .iter-card {
      padding: 0.5rem 0.6rem;
      margin-bottom: 0.4rem;
      border-radius: 6px;
      border-left: 3px solid #333;
      background: #161628;
      cursor: pointer;
      transition: background 0.15s;
    }
    .iter-card:hover { background: #1e1e3a; }
    .iter-card.selected { background: #1e1e3a; border-left-color: #6366f1; }
    .iter-card.valid { border-left-color: #4ade80; }
    .iter-card.error { border-left-color: #f87171; }
    .iter-card .iter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.25rem;
    }
    .iter-card .iter-num { font-size: 0.8rem; font-weight: 600; }
    .iter-card .iter-badge {
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
    }
    .iter-card.valid .iter-badge { color: #4ade80; background: #0f2a1a; }
    .iter-card.error .iter-badge { color: #f87171; background: #2a0f0f; }
    .iter-card .iter-preview {
      font-size: 0.7rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Main panel */
    #main-panel {
      grid-area: main;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1rem 1.25rem;
    }
    #code-display {
      flex: 1;
      background: #0a0a16;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 1rem;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      color: #7fdbca;
      line-height: 1.5;
    }
    #viz-area {
      display: none;
      margin-top: 0.75rem;
      height: 120px;
      border: 1px solid #222;
      border-radius: 8px;
      background: #0a0a16;
    }

    /* Controls footer */
    #controls {
      grid-area: controls;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.25rem;
      background: #131325;
      border-top: 1px solid #222;
    }
    #controls button {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.4rem 1.2rem;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a3a;
      color: #eee;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    #controls button:hover:not(:disabled) { background: #252550; border-color: #555; }
    #controls button:disabled { opacity: 0.35; cursor: not-allowed; }
    #btn-play { border-color: #4ade80; color: #4ade80; }
    #btn-play:hover:not(:disabled) { background: #0f2a1a; }
    #btn-stop { border-color: #f0c040; color: #f0c040; }
    #btn-stop:hover:not(:disabled) { background: #2a2510; }
    #btn-done { border-color: #f87171; color: #f87171; }
    #btn-done:hover:not(:disabled) { background: #2a0f0f; }
  </style>
  <script type="module" crossorigin src="/assets/index-DmH6Smtn.js"></script>
</head>
<body>
  <header>
    <h1>Strudel RLM</h1>
    <span id="phase" class="composing">Composing...</span>
  </header>

  <aside id="timeline">
    <h2>Iterations</h2>
  </aside>

  <main id="main-panel">
    <pre id="code-display">Waiting for first iteration...</pre>
    <div id="critic-panel" style="display:none; margin-top:0.75rem; padding:0.75rem; background:#0a0a16; border:1px solid #222; border-radius:8px;">
      <h3 style="font-size:0.75rem; text-transform:uppercase; letter-spacing:0.1em; color:#555; margin-bottom:0.5rem;">Critic Evaluation</h3>
      <div id="critic-scores" style="display:grid; grid-template-columns:1fr 1fr; gap:0.4rem; font-size:0.8rem;"></div>
      <div id="critic-status" style="margin-top:0.5rem; font-size:0.8rem;"></div>
    </div>
    <div id="viz-area"></div>
  </main>

  <footer id="controls">
    <button id="btn-play" disabled>&#9654; Play</button>
    <button id="btn-stop">&#9632; Stop</button>
    <button id="btn-done" disabled>&#10005; Done</button>
  </footer>

<script>
// --- WAV Recording ---
window.__initRecordingTap = function() {
  // Create a MediaStreamDestination tapped from AudioContext.destination
  // We monkey-patch connect() so anything routed to destination also goes to our tap
  if (window.__streamDest) return;
  var ctx = window.__audioContext || (window.AudioContext && new AudioContext());
  // Try to find the Strudel audio context
  if (!ctx) {
    // Look for it via getAudioContext in the bundled code
    try { ctx = document.querySelector('audio') && document.querySelector('audio').captureStream(); } catch(e) {}
  }
  return { ready: !!window.__streamDest };
};

window.__startRecording = function() {
  // Lazy-init: create stream destination from existing AudioContext
  if (!window.__streamDest) {
    // The bundled JS patches AudioNode.connect and creates __analyser
    // We need to create our own MediaStreamDestination from the same context
    var analyser = window.__analyser;
    if (analyser && analyser.context) {
      var ctx = analyser.context;
      var streamDest = ctx.createMediaStreamDestination();
      // Connect the analyser output to our recording tap
      analyser.connect(streamDest);
      window.__streamDest = streamDest;
    }
  }
  var streamDest = window.__streamDest;
  if (!streamDest) return { success: false, error: 'No stream destination — audio not initialized' };
  var recorder = new MediaRecorder(streamDest.stream, { mimeType: 'audio/webm;codecs=opus' });
  var chunks = [];
  recorder.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };
  recorder.start(100);
  window.__recorder = recorder;
  window.__recordChunks = chunks;
  return { success: true };
};

window.__stopRecording = function() {
  var recorder = window.__recorder;
  if (!recorder || recorder.state === 'inactive') {
    return Promise.resolve({ success: false, error: 'No active recording' });
  }
  return new Promise(function(resolve) {
    recorder.onstop = function() {
      var blob = new Blob(window.__recordChunks, { type: 'audio/webm' });
      var reader = new FileReader();
      reader.onloadend = function() {
        var arrayBuf = reader.result;
        var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioCtx.decodeAudioData(arrayBuf, function(audioBuf) {
          var numCh = audioBuf.numberOfChannels;
          var sr = audioBuf.sampleRate;
          var len = audioBuf.length;
          var bps = 2;
          var blockAlign = numCh * bps;
          var dataSize = len * blockAlign;
          var buf = new ArrayBuffer(44 + dataSize);
          var v = new DataView(buf);
          function ws(off, s) { for (var i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)); }
          ws(0,'RIFF'); v.setUint32(4,36+dataSize,true); ws(8,'WAVE');
          ws(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true);
          v.setUint16(22,numCh,true); v.setUint32(24,sr,true);
          v.setUint32(28,sr*blockAlign,true); v.setUint16(32,blockAlign,true);
          v.setUint16(34,16,true); ws(36,'data'); v.setUint32(40,dataSize,true);
          var off = 44;
          for (var i = 0; i < len; i++) {
            for (var ch = 0; ch < numCh; ch++) {
              var s = Math.max(-1, Math.min(1, audioBuf.getChannelData(ch)[i]));
              v.setInt16(off, s * 0x7FFF, true);
              off += 2;
            }
          }
          var bytes = new Uint8Array(buf);
          var bin = '';
          for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
          var b64 = btoa(bin);
          window.__recorder = null;
          window.__recordChunks = null;
          resolve({ success: true, base64: b64, sampleRate: sr, channels: numCh, durationSec: len / sr });
        }, function(err) {
          resolve({ success: false, error: 'Decode failed: ' + err });
        });
      };
      reader.readAsArrayBuffer(blob);
    };
    recorder.stop();
  });
};

window.__strudelPushCriticScores = function(data) {
  var panel = document.getElementById('critic-panel');
  var scoresEl = document.getElementById('critic-scores');
  var statusEl = document.getElementById('critic-status');
  if (!panel || !scoresEl) return;
  panel.style.display = 'block';
  var dims = [
    { key: 'harmony', label: 'Harmony', color: '#818cf8' },
    { key: 'rhythm', label: 'Rhythm', color: '#f0c040' },
    { key: 'arrangement', label: 'Arrangement', color: '#4ade80' },
    { key: 'production', label: 'Production', color: '#f472b6' },
  ];
  scoresEl.innerHTML = dims.map(function(d) {
    var score = data[d.key] || 0;
    var pct = score * 10;
    return '<div style="display:flex;align-items:center;gap:0.5rem;">' +
      '<span style="width:90px;color:#888;">' + d.label + '</span>' +
      '<div style="flex:1;height:6px;background:#1a1a3a;border-radius:3px;overflow:hidden;">' +
      '<div style="width:' + pct + '%;height:100%;background:' + d.color + ';border-radius:3px;"></div>' +
      '</div>' +
      '<span style="color:' + d.color + ';font-weight:600;width:30px;text-align:right;">' + score + '</span>' +
      '</div>';
  }).join('');
  var avg = data.average ? data.average.toFixed(1) : '?';
  var approved = data.approved;
  var roundNum = data.round || '?';
  statusEl.innerHTML = '<span style="color:#888;">Round ' + roundNum + '</span> · ' +
    '<span style="color:' + (approved ? '#4ade80' : '#f0c040') + ';">Avg: ' + avg + '/10 ' +
    (approved ? '✓ Approved' : '→ Revising...') + '</span>';
};
</script>
</body>
</html>
