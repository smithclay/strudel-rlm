<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Strudel Test</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #1a1a2e; color: #eee; }
    button { font-size: 1.2rem; padding: 0.5rem 1.5rem; margin: 0.5rem; cursor: pointer; }
    #status { margin-top: 1rem; color: #888; }
    #code-display { background: #0d0d1a; border: 1px solid #333; padding: 1rem; margin-top: 1rem; white-space: pre-wrap; font-family: monospace; font-size: 0.9rem; color: #7fdbca; min-height: 3rem; max-height: 20rem; overflow-y: auto; }
    #iter-count { color: #666; margin-top: 0.5rem; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Strudel RLM</h1>
  <button id="play">Play</button>
  <button id="stop">Stop</button>
  <div id="status">Click play to start</div>
  <div id="iter-count"></div>
  <pre id="code-display"></pre>
  <script type="module" src="/main.js"></script>
</body>
</html>
